services:
  bercario_backend_local:
    platform: linux/arm64
    container_name: bercario_backend_local
    hostname: bercario_backend_local
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: local
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - ALL_PROXY=
      - all_proxy=
      - DB_HOST=mariadb
      - DATABASE_URL=mysql://bercario_user:bercario_pass@mariadb:3306/bercario
      - JWT_SECRET=super-secret-key-12345
      - PORT=8000
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=bercario
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadminpassword
      - S3_PUBLIC_URL_PREFIX=http://localhost:9000/bercario
    ports:
      - 8000:8000
    networks:
      - bercario_backend_network
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      - mariadb
      - minio

  mariadb:
    image: mariadb:latest
    container_name: bercario_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: bercario
      MARIADB_USER: bercario_user
      MARIADB_PASSWORD: bercario_pass
    ports:
      - "3306:3306"
    networks:
      - bercario_backend_network
    volumes:
      - mariadb_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: bercario_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - bercario_backend_network
    volumes:
      - minio_data:/data

networks:
  bercario_backend_network:
    driver: bridge

volumes:
  mariadb_data:
  minio_data:
