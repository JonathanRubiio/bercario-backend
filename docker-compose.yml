version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: bercario-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bercario
      MYSQL_USER: bercario_user
      MYSQL_PASSWORD: bercario_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bercario-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql://bercario_user:bercario_pass@db:3306/bercario
      PORT: 8000
      JWT_SECRET: super-secret-key-12345
    depends_on:
      - db

volumes:
  mariadb_data:
